syntax = "proto3";


option csharp_namespaces = "Todo.GrpcServer.Protos";

service TodoService
{
	// Unary - send one request, get one response 
	rpc CreateTodo (CreateTodoRequest) returns (TodoItem);

	// Unary - send one request, get one response
	rpc DeleteTodo (DeleteTodoRequest) returns (DeleteTodoResponse);

	// Server Streaming - send one request, server streams back multiple responses
	rpc ListTodos (ListTodoRequest) returns (stream TodoItem);

	// Client Streaming - client stream multiple requests, server replies once 
	rpc BulkTodos (stream CreateTodoRequest) returns (BulkCreateResponse);

	// Bidirectional Streaming - both sides stream simultaneously
	rpc UpdateTodos (stream UpdateTodoRequest) returns (stream TodoItem);  
}

message TodoItem
{
	int32 id = 1;
	string title = 2;
	bool is_completed = 3;
}


message CreateTodoRequest
{
	string title = 1;
}

message DeleteTodoRequest
{
	int32 id = 1;
}

message DeleteTodoResponse
{
	bool success = 1;
}

message ListTodoRequest
{
	// Empty - list all todos
}


message BulkCreateResponse
{
	int32 created_count = 1;
	repeated TodoItem = 2;
}

message UpdateTodoRequest
{
	int32 id = 1;
	string title = 2;
	bool is_completed = 3;
}

